name: fitlek1
description: Fitlek - Premium Fitness Coach App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
   
  http_parser: ^4.0.2
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.0
  image_picker: ^1.2.2
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  shared_preferences: ^2.3.2
  file_picker: ^8.0.0
  flutter_svg: ^2.3.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/branding/icon_app.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/branding/icon_app.png"
  windows:
    generate: true
    image_path: "assets/branding/icon_app.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
